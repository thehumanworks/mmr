<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mmr Retrieval Docs</title>
  <style>
    :root { color-scheme: light dark; --accent: #0f766e; --line: #94a3b8; --muted: #64748b; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; line-height: 1.55; }
    main { max-width: 920px; margin: 0 auto; padding: 40px 20px 64px; }
    h1 { font-size: 2rem; margin: 0 0 12px; }
    .pages { display: grid; gap: 16px; margin-top: 28px; }
    .page { border: 1px solid var(--line); border-radius: 6px; padding: 18px; }
    .tabs { display: flex; gap: 8px; margin-top: 12px; }
    .tab { border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; text-decoration: none; color: inherit; }
    .tab:hover { border-color: var(--accent); }
    .muted { color: var(--muted); }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
</head>
<body>
  <main>
    <h1>mmr Retrieval Docs</h1>
    <p class="muted">Static docs-first contract. Human and Agent views use the required <code>/human/&lt;page-id&gt;</code> and <code>/agent/&lt;page-id&gt;</code> routes.</p>
    <section class="pages" aria-label="Docs pages">
      <article class="page">
        <h2>Overview</h2>
        <p>Purpose and navigation for the docs-first retrieval work.</p>
        <nav class="tabs" aria-label="Overview view tabs">
          <a class="tab" href="/human/overview/">Human</a>
          <a class="tab" href="/agent/overview/">Agent</a>
        </nav>
      </article>
      <article class="page">
        <h2>Retrieval Pipeline</h2>
        <p>Product contract for <code>mmr retrieve &lt;query&gt;</code>.</p>
        <nav class="tabs" aria-label="Retrieval view tabs">
          <a class="tab" href="/human/retrieve/">Human</a>
          <a class="tab" href="/agent/retrieve/">Agent</a>
        </nav>
      </article>
    </section>
  </main>
</body>
</html>
